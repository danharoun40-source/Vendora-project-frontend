<div class="fixed top-4 right-4 z-[100] flex flex-col gap-2 w-[92%] max-w-sm">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="flex items-start gap-3 rounded-xl px-4 py-3 shadow-soft text-sm font-medium text-white animate-[fadein_0.2s_ease-out]"
      [class.bg-emerald-500]="toast.type === 'success'"
      [class.bg-rose-500]="toast.type === 'error'"
      [class.bg-brand-600]="toast.type === 'info'"
    >
      <span class="flex-1">{{ toast.message }}</span>
      <button (click)="toastService.dismiss(toast.id)" class="text-white/80 hover:text-white">
        &times;
      </button>
    </div>
  }
</div>
