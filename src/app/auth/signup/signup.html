<div class="container-fluid vh-100">
    <div class="row h-100">

        <!-- Left Side -->
        <div class="col-md-6 left-side d-flex justify-content-center align-items-center">

            <div class="text-center">

                <img src="/images/logo.png" class="logo">

                <h2 class="text-dark mt-3">Vendora</h2>

                <p class="text-dark">
                    Manage. Sell. Grow.
                </p>

                <img src="/images/market.png" class="store-image">

                <p class="text-dark mt-4">
                    Create your account <br>
                    and start your own store <br>
                    in minutes.
                </p>

            </div>

        </div>

        <!-- Right Side -->
        <div class="col-lg-6 right-side d-flex align-items-center">

            <div class="form-container">

                <h2>Create Your Account</h2>

                <p class="subtitle">
                    Join thousands of small business owners on Vendora.
                </p>
                <form>

                    <!-- Full Name -->
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" placeholder="Enter Your Name">
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="Enter Your Email">
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" placeholder="Enter Password">
                    </div>

                    <!-- Confirm Password -->
                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" placeholder="Confirm Password">
                    </div>

                    <!-- Phone -->
                    <div class="mb-4">
                        <label class="form-label">Phone Number</label>
                        <input type="text" class="form-control" placeholder="Enter your number">
                    </div>

                    <!-- Button -->
                    <button class="btn create-btn w-100">
                        Create Account
                    </button>

                    <p class="login-text mt-4 text-center">
                        Already have an account?
                        <a href="#">Login</a>
                    </p>

                </form>

            </div>

        </div>

    </div>
</div>
