@if (open) {
  <div class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="card p-6 w-full max-w-sm">
      <h3 class="text-lg font-bold text-gray-800">{{ title }}</h3>
      <p class="text-sm text-gray-500 mt-2">{{ message }}</p>
      <div class="flex gap-3 mt-6">
        <button class="flex-1 rounded-xl border border-gray-200 py-2.5 font-semibold text-gray-600 hover:bg-gray-50" (click)="cancelled.emit()">
          Cancel
        </button>
        <button class="flex-1 rounded-xl bg-rose-500 hover:bg-rose-600 text-white py-2.5 font-semibold" (click)="confirmed.emit()">
          {{ confirmLabel }}
        </button>
      </div>
    </div>
  </div>
}
